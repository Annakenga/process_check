<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Проверьте, подходит ли процесс для первого внедрения в Яндекс Трекер."
    />
    <title>Процесс-чек</title>
    <link rel="icon" href="./public/tracker-logo.png" />
    <script>
      if (
        window.top !== window &&
        window.matchMedia("(max-width: 700px)").matches
      ) {
        document.documentElement.classList.add("is-mobile-embedded");
      }
    </script>
    <link rel="stylesheet" href="./process-check-styles-v48.css" />
    <style>
      @font-face {
        font-family: "Inter Variable";
        src: url("./public/fonts/inter-cyrillic-wght-normal.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
      }

      @font-face {
        font-family: "Inter Variable";
        src: url("./public/fonts/inter-cyrillic-ext-wght-normal.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div
      class="mobile-launch"
      aria-label="Открыть Процесс-чек на отдельной странице"
    >
      <p class="mobile-launch-text">
        Уже присмотрели процесс для первого внедрения?
      </p>
      <a
        class="mobile-launch-button"
        href="./?mobile=1&amp;v=48"
        target="_blank"
        rel="noopener"
      >Проверить процесс</a>
    </div>
    <script src="./process-check-app-v48.js" defer></script>
  </body>
</html>
